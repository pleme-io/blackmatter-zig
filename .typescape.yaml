schema_version: 1
manifest:
  name: blackmatter-zig
  kind: BlackmatterComponent
  archetype: blackmatter-component-custom-overlay
  description: Prebuilt Zig compiler, from-source zls, overlay, and tool builder.
  custom_flake: true
  custom_flake_reason: |
    Same rationale as blackmatter-go — exposes a toolchain overlay + lib/ import
    paths for direct consumption by downstream flakes. Template doesn't fit.
dimensions:
  vocabulary: [zig, zls, toolchain, overlay, prebuilt]
  domains: [Nix, Zig]
  stack: []
  modules: {}
  render:
    produces:
      - "pkgs.zigToolchain (prebuilt)"
      - "pkgs.zls (from source)"
      - "lib/overlay.nix, lib/zig/bootstrap.nix, lib/zig/zls.nix"
  compliance:
    satisfies: []
    participates: []
  dag:
    inputs: [nixpkgs, substrate, fenix]
  attestation: { merkle_root: null, signed_by: null, producer: custom-flake }
